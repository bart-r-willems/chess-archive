<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Archive Viewer</title>
<link rel="stylesheet" href="viewer.css?v=0.4">
</head>
<body>

<header>
  <h1>♟ Chess Archive</h1>
  <span>PGN Viewer</span>
  <span id="buildBadge" style="margin-left:auto;font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;align-self:center;"></span>
  <button id="btnSettings" style="margin-left:16px;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:0.85rem;align-self:center;" title="Customise">⚙ Settings</button>
</header>

<div class="main">
  <!-- Game list column -->
  <div class="game-list-col" id="gameListCol" style="display:none">
    <div class="game-select-wrap" style="margin-bottom:8px">
      <label>Select File</label>
      <select id="pgnSelect"><option>Loading…</option></select>
    </div>
    <div class="game-list-wrap">
      <table class="game-table" id="gameTable">
        <thead>
          <tr>
            <th class="gt-col-num"  data-col="num"   >#</th>
            <th class="gt-col-name" data-col="white" ><span class="gt-th-label">White</span><button class="gt-funnel" data-filter-col="white"  title="Filter White">⊿</button></th>
            <th class="gt-col-name" data-col="black" ><span class="gt-th-label">Black</span><button class="gt-funnel" data-filter-col="black"  title="Filter Black">⊿</button></th>
            <th class="gt-col-date" data-col="date"  ><span class="gt-th-label">Date</span><button class="gt-funnel" data-filter-col="date"   title="Filter Date">⊿</button></th>
            <th class="gt-col-event"data-col="event" ><span class="gt-th-label">Event</span><button class="gt-funnel" data-filter-col="event"  title="Filter Event">⊿</button></th>
            <th class="gt-col-res"  data-col="result"><span class="gt-th-label">Res</span><button class="gt-funnel" data-filter-col="result" title="Filter Result">⊿</button></th>
            <th class="gt-col-eco"  data-col="eco"   ><span class="gt-th-label">ECO</span><button class="gt-funnel" data-filter-col="eco"    title="Filter ECO">⊿</button></th>
          </tr>
        </thead>
        <tbody id="gameTableBody"></tbody>
      </table>
    </div>
    <!-- Active filters badge row -->
    <div id="filterStatus" class="filter-status" style="display:none"></div>
  </div>

  <!-- Filter popover (shared, moved around the DOM) -->
  <div id="filterPopover" class="filter-popover" style="display:none">
    <div id="filterPopoverInner"></div>
  </div>

  <!-- Centre column: board + controls -->
  <div class="left-col">
    <div id="loadMsg">Fetching game file…</div>

    <div class="board-area" id="boardWrap" style="display:none">
      <!-- Eval bar -->
      <div class="eval-col">
        <div class="eval-bar-wrap" id="evalBarWrap">
          <div class="eval-bar-black" id="evalBarBlack"></div>
          <div class="eval-bar-white" id="evalBarWhite"></div>
        </div>
        <div class="eval-score" id="evalScore">—</div>
      </div>
      <!-- Board + coords -->
      <div class="board-with-coords" style="position:relative">
        <div class="coord-ranks" id="rankCoords"></div>
        <div style="position:relative">
          <div id="board"></div>
          <!-- Arrow SVG overlay -->
          <svg id="arrowLayer" style="position:absolute;top:0;left:0;width:512px;height:512px;pointer-events:none;" viewBox="0 0 512 512"></svg>
        </div>
        <div class="coord-files" id="fileCoords"></div>
        <div id="resultPopup"><div class="popup-inner" id="popupInner"></div></div>
      </div>
    </div>

    <div class="controls" id="controls" style="display:none">
      <button class="btn" id="btnStart" title="Go to start">⏮</button>
      <button class="btn" id="btnPrev"  title="Previous move">◀</button>
      <button class="btn" id="btnNext"  title="Next move">▶</button>
      <button class="btn" id="btnEnd"   title="Go to end">⏭</button>
      <span class="move-counter" id="moveCtr"></span>
      <button class="btn btn-analyse" id="btnAnalyse" title="Toggle Stockfish analysis">⚡ Analyse</button>
    </div>

    <div class="status" id="status"></div>
    <div class="pv-line" id="pvLine"></div>
    <div class="kb-hint" id="kbHint" style="display:none">← → arrow keys to navigate · Home / End to jump</div>
  </div>

  <!-- Right column -->
  <div class="right-col">
    <div class="info-box" id="infoBox">
      <h2>Game Info</h2>
      <div id="infoRows"><div class="info-row"><span class="info-label">—</span></div></div>
    </div>
    <div class="move-list-box">
      <h2>Moves</h2>
      <div id="moveList"></div>
    </div>
  </div>
</div>


<!-- Settings Modal -->
<div id="settingsModal" class="smodal-backdrop">
  <div class="smodal">
    <div class="smodal-header">
      <h2>⚙ Settings</h2>
      <button id="modalClose" class="smodal-close">✕</button>
    </div>
    <div id="settingsBody" class="smodal-body"></div>
  </div>
</div>

<script src="chess.js?v=0.4.2"></script>
</body>
</html>
