<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PGN Viewer</title>
  <script src="pgn4web.js"></script>
</head>

<body onload="startPgnViewer()">
  <h1>PGN Viewer</h1>

  <select id="pgnSelect" onchange="loadPGN()">
    <option value="">-- choose a file --</option>
    <option value="../pgn/my_games.pgn">All games</option>
  </select>

  <div id="board" style="margin-top:20px;"></div>

  <script>
    function startPgnViewer() {
      // required initialization
      pgn4web_boardID = "board";
      pgn4web_init();
    }

    function loadPGN() {
      var file = document.getElementById("pgnSelect").value;
      if (file) {
        // full URL required on GitHub Pages
        var fullURL = window.location.origin + window.location.pathname.replace("viewer/viewer.html","") + file.replace("..","");
        pgn4web_load_pgn_url(fullURL);
      }
    }
  </script>
</body>
</html>
