<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PGN Viewer</title>
  <script src="pgn4web.js"></script>

  <style>
    #boardTable { border: 1px solid #444; }
    #moves { width: 400px; height: 200px; overflow-y: scroll; border: 1px solid #ccc; padding: 5px; }
  </style>
</head>

<body onload="startPgnViewer()">

  <h1>PGN Viewer v6</h1>

  <p>Select a PGN file:</p>
  <select id="pgnSelect" onchange="loadPGN()">
    <option value="">-- choose a file --</option>
    <option value="my_games.pgn">My Games</option>
  </select>

  <h2>Board</h2>

  <!-- REQUIRED BOARD STRUCTURE -->
  <table id="boardTable">
    <tr>
      <td>
        <div id="board"></div>
      </td>
    </tr>
  </table>

  <h2>Moves</h2>
  <div id="moves"></div>

  <!-- REQUIRED CONTROLS -->
  <div>
    <button onclick="pgn4web_moveFirst()">|◀</button>
    <button onclick="pgn4web_movePrevious()">◀</button>
    <button onclick="pgn4web_moveNext()">▶</button>
    <button onclick="pgn4web_moveLast()">▶|</button>
  </div>

  <script>
    function startPgnViewer() {
      pgn4web_boardID = "board";
      pgn4web_movelistID = "moves";
      pgn4web_init();
    }

    function loadPGN() {
      var file = document.getElementById("pgnSelect").value;
      if (!file) return;

      var fullURL = "https://bart-r-willems.github.io/chess-archive/pgn/" + file;

      pgn4web_load_pgn_url(fullURL);
    }
  </script>

</body>
</html>
