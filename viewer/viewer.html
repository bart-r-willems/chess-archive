<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PGN Viewer v7</title>
  <script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0/dist/chess.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <style>
    #board { width: 400px; margin-bottom: 20px; }
    #moves { width: 400px; height: 250px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
  </style>
</head>

<body>
  <h1>PGN Viewer</h1>

  <p>Select a PGN file:</p>
  <select id="pgnSelect" onchange="loadPGN()">
    <option value="">-- choose a file --</option>
    <option value="my_games.pgn">My Games</option>
  </select>

  <div id="board"></div>
  <div id="moves"></div>

  <script>
    let board;
    let game = new Chess();

    function loadPGN() {
      const file = document.getElementById("pgnSelect").value;
      if (!file) return;

      const url = "https://bart-r-willems.github.io/chess-archive/pgn/" + file;

      fetch(url)
        .then(response => response.text())
        .then(pgn => {
          game.load_pgn(pgn);
          board.position(game.fen());
          document.getElementById("moves").innerHTML = pgn.replace(/\n/g, "<br>");
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
      board = Chessboard("board", {
        position: "start"
      });
    });
  </script>

</body>
</html>
